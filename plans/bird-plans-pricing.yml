name: Bird Plans and Pricing
description: Bird offers three pricing models — pay-as-you-go, monthly targeted contacts
  bundle, and enterprise custom pricing — covering email, SMS, WhatsApp, RCS, push
  notifications, voice, and flow invocations.
url: https://bird.com/en-us/pricing
created: '2026-06-13'
modified: '2026-06-13'
plans:
  - name: Pay as You Go
    description: Usage-based pricing with no monthly commitments and no minimum spend.
      Start sending instantly and pay only for what you use.
    url: https://bird.com/en-us/pricing
    rate_limits:
      requests_per_second: 100
      burst_capacity: 250
    features:
      - Full automation suite
      - Analytics and template studio
      - CDP and integrations
      - API access
      - Email, SMS, WhatsApp, RCS, Push, Voice channels
    pricing:
      - channel: Email
        rate: '$1.50 per 1,000 messages'
        notes: Starting rate; volume discounts available
      - channel: SMS
        rate: Country-dependent
        notes: Carrier passthrough fees apply separately
      - channel: WhatsApp
        rate: '$0.005 per message'
        notes: Plus Meta vendor passthrough fees
      - channel: Push Notifications
        rate: '$0.0005 per notification'
        notes: Applies to all platforms (iOS, Android, Web)
      - channel: RCS
        rate: '$0.005 per message'
        notes: Plus carrier passthrough costs
      - channel: Voice
        rate: Per-minute billing
        notes: Pay only for minutes and interactions used
      - channel: Flow Invocations
        rate: '$0.05 per unit'
        notes: Charged per automation flow execution
  - name: Monthly Targeted Contacts Bundle
    description: Predictable monthly subscription for scaling businesses. Includes
      a contacts bundle and a channel messages allotment. Recommended for organizations
      with predictable communication needs.
    url: https://bird.com/en-us/pricing
    rate_limits:
      requests_per_second: 100
      burst_capacity: 250
    minimums:
      contacts_per_month: 50000
      channel_messages_per_month: 500000
    features:
      - Full automation suite
      - Analytics and template studio
      - CDP and integrations
      - API access
      - Email, SMS, WhatsApp, RCS, Push, Voice channels
      - Volume discounts on channel usage
    pricing:
      - channel: Bundle
        rate: Custom based on volume
        notes: Contact Bird sales for exact pricing at chosen tier
  - name: Enterprise
    description: Custom volume pricing with dedicated support, SLA guarantees, SSO,
      multiple workspaces, and a Technical Account Manager. Rate limits can be extended
      beyond defaults on request.
    url: https://bird.com/en-us/contact
    rate_limits:
      requests_per_second: Up to 10000
      notes: Custom rate limits negotiated per contract
    features:
      - Full automation suite
      - Analytics and template studio
      - CDP and integrations
      - API access
      - Email, SMS, WhatsApp, RCS, Push, Voice channels
      - Dedicated support and Technical Account Manager
      - SLA guarantees
      - SSO (Single Sign-On)
      - Multiple workspaces
      - Custom rate limits
      - Custom volume pricing and rates
    pricing:
      - channel: All channels
        rate: Custom negotiated pricing
        notes: Contact Bird sales team for enterprise quotes
