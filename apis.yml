name: Bird
description: Bird (formerly MessageBird) is an omnichannel customer communications
  platform offering REST APIs for email, SMS, WhatsApp, RCS, push notifications,
  voice, and data management. Trusted by more than 450,000 developers, Bird provides
  enterprise-grade connectivity through a global carrier network alongside a full
  customer engagement and marketing automation suite.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/bird/refs/heads/main/apis.yml
version: '0.19'
aid: bird
type: Index
tags:
